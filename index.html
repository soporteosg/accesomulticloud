<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Seguro Multicloud</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; padding-top: 50px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card-main { box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: 15px; border: none; }
        .card-header { border-radius: 15px 15px 0 0 !important; font-weight: bold; }
        .locked { opacity: 0.4; pointer-events: none; filter: grayscale(1); }
        #login-container { text-align: center; padding: 20px; border-bottom: 1px solid #eee; }
        .status-card { transition: all 0.3s ease; border: 2px solid; border-radius: 10px; background-color: #ffffff; }
        .status-card:hover { transform: translateY(-3px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .fw-bold-custom { font-weight: 600; color: #495057; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card card-main">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h3 class="mb-0">Acceso Multicloud</h3>
                    </div>
                    <div class="card-body p-4">
                        
                        <div id="login-container">
                            <p class="fw-bold text-muted mb-3">Acceso restringido a One Solutions</p>
                            <div id="g_id_onload"
                                 data-client_id="672784122594-f3uh5ct4u3pttu9qlu6jki4en9fl86dp.apps.googleusercontent.com"
                                 data-callback="handleCredentialResponse"
                                 data-auto_prompt="false">
                            </div>
                            <div class="g_id_signin" data-type="standard"></div>
                        </div>

                        <form id="accessForm" class="locked mt-3">
                            <div class="mb-3">
                                <label class="form-label fw-bold-custom">Usuario Autenticado</label>
                                <input type="email" id="correo" class="form-control form-control-lg bg-light" readonly>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold-custom">Tu IP Pública Detectada</label>
                                <input type="text" id="ip" class="form-control form-control-lg bg-light" readonly>
                                <small class="text-muted">Se usará esta IP para otorgar permisos.</small>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold-custom">Selecciona Ambientes:</label>
                                <div class="p-3 border rounded bg-light">
                                    <div class="form-check mb-2">
                                        <input class="form-check-input" type="checkbox" value="aws_a" id="check1" checked>
                                        <label class="form-check-label" for="check1">Servidor 44.217.52.70</label>
                                    </div>
                                    <div class="form-check mb-2">
                                        <input class="form-check-input" type="checkbox" value="aws_b" id="check2" checked>
                                        <label class="form-check-label" for="check2">Servidor 3.230.109.172</label>
                                    </div>
                                    <div class="form-check mb-2">
                                        <input class="form-check-input" type="checkbox" value="oci" id="check3" checked>
                                        <label class="form-check-label" for="check3">Ambiente Banco G&T</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" value="huawei" id="check4" checked>
                                        <label class="form-check-label" for="check4">Servidor 119.8.148.110</label>
                                    </div>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 btn-lg fw-bold" id="btnSubmit">
                                ACTUALIZAR ACCESOS
                            </button>
                        </form>

                        <div id="resultado" class="mt-4 d-none">
                            <hr>
                            <h6 class="text-center fw-bold text-secondary mb-3">RESULTADO DE SINCRONIZACIÓN</h6>
                            <div id="statusCards" class="row g-2"></div>
                        </div>
                    </div>
                    <div class="card-footer text-center bg-transparent border-0 pb-4">
                        <small class="text-muted">Soporte OSG</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ID_TOKEN = "";

        // 1. Manejar el Login de Google
        function handleCredentialResponse(response) {
            ID_TOKEN = response.credential;
            const payload = JSON.parse(atob(ID_TOKEN.split('.')[1]));
            
            // Inyectar correo y desbloquear formulario
            document.getElementById('correo').value = payload.email;
            document.getElementById('accessForm').classList.remove('locked');
            document.getElementById('login-container').innerHTML = 
                `<div class="alert alert-success py-2">✅ Conectado como: <b>${payload.email}</b></div>`;
        }

        // 2. Detección automática de IP
        fetch('https://api.ipify.org?format=json')
            .then(res => res.json())
            .then(data => { document.getElementById('ip').value = data.ip; })
            .catch(err => console.error("Error detectando IP:", err));

        // 3. Manejo del Formulario
        document.getElementById('accessForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const resDiv = document.getElementById('resultado');
            const statusCards = document.getElementById('statusCards');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> PROCESANDO...';
            resDiv.classList.add('d-none');
            statusCards.innerHTML = ""; 

            const payload = {
                token: ID_TOKEN,
                ip: document.getElementById('ip').value,
                correo: document.getElementById('correo').value,
                ambientes: Array.from(document.querySelectorAll('input[type=checkbox]:checked')).map(c => c.value)
            };

            try {
                const response = await fetch('https://tyq4kvs232.execute-api.us-east-1.amazonaws.com/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                const data = result.body ? JSON.parse(result.body) : result;
                
                resDiv.classList.remove('d-none');

                if (data.actualizados) {
                    data.actualizados.forEach(nube => {
                        statusCards.innerHTML += `
                            <div class="col-6"><div class="card status-card border-success h-100 shadow-sm p-2 text-center text-success fw-bold small">✅ ${nube}</div></div>`;
                    });
                }

                if (data.errores) {
                    Object.keys(data.errores).forEach(nube => {
                        statusCards.innerHTML += `
                            <div class="col-6"><div class="card status-card border-danger h-100 shadow-sm p-2 text-center text-danger small">❌ ${nube}<br><span style="font-size:0.6rem">${data.errores[nube]}</span></div></div>`;
                    });
                }
                
            } catch (error) {
                alert("❌ Error de comunicación con AWS");
            } finally {
                btn.disabled = false;
                btn.innerText = "ACTUALIZAR ACCESOS";
            }
        });
    </script>
</body>
</html>
