<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Multicloud RDP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-radius: 12px; }
        .card-header { border-radius: 12px 12px 0 0 !important; }
        .status-card { transition: transform 0.2s; border: 2px solid; }
        .status-card:hover { transform: scale(1.02); }
        .card-body span { font-weight: bold; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h3 class="mb-0">Gestor de Acceso IP</h3>
                    </div>
                    <div class="card-body p-4">
                        <form id="accessForm">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Correo Electrónico</label>
                                <input type="email" id="correo" class="form-control" placeholder="jhonny@empresa.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Tu IP Actual (Detectada)</label>
                                <input type="text" id="ip" class="form-control bg-light" readonly>
                                <small class="text-muted">Detectamos tu IP automáticamente por seguridad.</small>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Ambientes a Actualizar</label>
                                <div class="form-check mb-1">
                                    <input class="form-check-input" type="checkbox" value="aws_a" id="check1" checked>
                                    <label class="form-check-label" for="check1">Servidor AWS Principal</label>
                                </div>
                                <div class="form-check mb-1">
                                    <input class="form-check-input" type="checkbox" value="aws_b" id="check2" checked>
                                    <label class="form-check-label" for="check2">Servidor AWS Backup</label>
                                </div>
                                <div class="form-check mb-1">
                                    <input class="form-check-input" type="checkbox" value="oci" id="check3" checked>
                                    <label class="form-check-label" for="check3">Ambiente Banco G&T (OCI)</label>
                                </div>
                                <div class="form-check mb-3">
                                    <input class="form-check-input" type="checkbox" value="huawei" id="check4" checked>
                                    <label class="form-check-label" for="check4">Servidor Huawei Cloud</label>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-success w-100 py-2 fw-bold" id="btnSubmit">Actualizar Accesos</button>
                        </form>

                        <div id="resultado" class="mt-4 d-none">
                            <hr>
                            <h5 class="text-center mb-3">Estado de la Operación:</h5>
                            <div id="statusCards" class="row g-2">
                                </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Obtener la IP pública automáticamente al cargar
        fetch('https://api.ipify.org?format=json')
            .then(res => res.json())
            .then(data => document.getElementById('ip').value = data.ip);

        document.getElementById('accessForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const resDiv = document.getElementById('resultado');
            const statusCards = document.getElementById('statusCards');
            
            btn.disabled = true;
            btn.innerText = "⏳ Procesando...";
            statusCards.innerHTML = ""; // Limpiar resultados anteriores

            const payload = {
                ip: document.getElementById('ip').value,
                correo: document.getElementById('correo').value,
                ambientes: Array.from(document.querySelectorAll('input[type=checkbox]:checked')).map(c => c.value)
            };

            try {
                const LAMBDA_URL = 'https://tyq4kvs232.execute-api.us-east-1.amazonaws.com/update'; 
                
                const response = await fetch(LAMBDA_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                // Manejar si la respuesta viene stringificada o directa
                const data = result.body ? JSON.parse(result.body) : result;
                
                resDiv.classList.remove('d-none');

                // 1. Generar tarjetas de ÉXITO
                data.actualizados.forEach(nube => {
                    statusCards.innerHTML += `
                        <div class="col-6">
                            <div class="card status-card border-success bg-light h-100">
                                <div class="card-body p-2 text-center d-flex align-items-center justify-content-center">
                                    <span class="text-success small">✅ ${nube}</span>
                                </div>
                            </div>
                        </div>`;
                });

                // 2. Generar tarjetas de ERROR
                Object.keys(data.errores).forEach(nube => {
                    statusCards.innerHTML += `
                        <div class="col-6">
                            <div class="card status-card border-danger bg-light h-100">
                                <div class="card-body p-2 text-center">
                                    <span class="text-danger small">❌ ${nube}</span>
                                    <p class="mb-0 text-muted" style="font-size: 0.65em;">${data.errores[nube]}</p>
                                </div>
                            </div>
                        </div>`;
                });
                
            } catch (error) {
                alert("❌ Error de conexión con el servidor");
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.innerText = "Actualizar Accesos";
            }
        });
    </script>
</body>
</html>
