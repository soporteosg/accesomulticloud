<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Multicloud RDP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .status-badge { font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white text-center">
                        <h3>Gestor de Acceso IP</h3>
                    </div>
                    <div class="card-body">
                        <form id="accessForm">
                            <div class="mb-3">
                                <label class="form-label">Correo Electrónico</label>
                                <input type="email" id="correo" class="form-control" placeholder="jhonny@empresa.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Tu IP Actual (Detectada)</label>
                                <input type="text" id="ip" class="form-control" readonly>
                                <small class="text-muted">Detectamos tu IP automáticamente por seguridad.</small>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Ambientes a Actualizar</label>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="aws_a" checked> Servidor 44.216.245.222
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="aws_b" checked> Servidor 3.230.109.172
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="oci" checked> Ambiente Banco G&T
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="huawei" checked> Servidor 119.8.148.110
                                </div>
                            </div>
                            <button type="submit" class="btn btn-success w-100" id="btnSubmit">Actualizar Accesos</button>
                        </form>
                        <div id="resultado" class="mt-4 d-none">
                            <h5>Resultado:</h5>
                            <pre id="jsonResult" class="bg-light p-2"></pre>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Obtener la IP pública automáticamente al cargar
        fetch('https://api.ipify.org?format=json')
            .then(res => res.json())
            .then(data => document.getElementById('ip').value = data.ip);

        document.getElementById('accessForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const resDiv = document.getElementById('resultado');
            const resPre = document.getElementById('jsonResult');
            
            btn.disabled = true;
            btn.innerText = "Procesando...";

            const payload = {
                ip: document.getElementById('ip').value,
                correo: document.getElementById('correo').value,
                ambientes: Array.from(document.querySelectorAll('input[type=checkbox]:checked')).map(c => c.value)
            };

            try {
                // URL API (Asegúrate de que incluya la ruta final si la configuraste en API Gateway)
                const LAMBDA_URL = 'https://tyq4kvs232.execute-api.us-east-1.amazonaws.com/acceso'; 
                
                const response = await fetch(LAMBDA_URL, {
                    method: 'POST',
                    mode: 'cors', // Habilitar modo CORS explícito
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                resDiv.classList.remove('d-none');
                
                // Si la respuesta viene con un 'body' stringificado (formato Proxy)
                if (result.body) {
                    resPre.innerText = JSON.stringify(JSON.parse(result.body), null, 2);
                } else {
                    // Si la respuesta viene como JSON directo
                    resPre.innerText = JSON.stringify(result, null, 2);
                }
                
            } catch (error) {
                console.error("Error detallado:", error);
                alert("Error al conectar con la API).");
            } finally {
                btn.disabled = false;
                btn.innerText = "Actualizar Accesos";
            }
        });
    </script>
</body>
</html>
